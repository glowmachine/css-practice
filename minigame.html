<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Michael Wong">
    <meta name="description" content="Nier:Automata CSS Demo">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nier:Automata CSS Demo</title>
    <link rel="stylesheet" href="style.css" type="text/css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>
    <header>
        <nav class="decorative-bar">
            <ul>
                <li><a href="/" class="fx clickable"><i class="material-icons">square</i>/</a></li>
                <li><a href="/log.html" class="fx clickable"><i class="material-icons">square</i>Log</a></li>
                <li><a href="/projects.html" class="fx clickable"><i class="material-icons">square</i>Projects</a></li>
                <li><a href="/git.html" class="fx clickable"><i class="material-icons">square</i>Git</a></li>
                <li><a href="/minigame.html" class="current-page clickable"><i class="material-icons">square</i>Minigame</a></li>
                <li><a href="/about.html" class="fx clickable"><i class="material-icons">square</i>About</a></li>
                <li><a href="/contact.html" class="fx clickable"><i class="material-icons">square</i>Contact</a></li>
            </ul>
        </nav>
        <div class="decorative-rule-line">
            <div class="decorative-rule-dots"></div>
        </div>
    </header>
    <main>
        <hgroup>
            <h1>Minigame</h1>
            <p>Tic-Tac-Toe</p>
        </hgroup>
        <form action="" class="tictactoe">
            <div class="controls decorative-bar">
                <button type="reset" class="fx clickable"><i class="material-icons">square</i> Reset</button>
            </div>
            <div class="game board">
                <div class="square">
                    <input type="checkbox" id="1-1" name="shape"><label for="1-1">X</label>
                    <input type="checkbox" id="1-2" name="shape"><label for="1-2">O</label>
                </div>
                <div class="square">
                    <input type="checkbox" id="2-1" name="shape"><label for="2-1">X</label>
                    <input type="checkbox" id="2-2" name="shape"><label for="2-2">O</label>
                </div>
                <div class="square">
                    <input type="checkbox" id="3-1" name="shape"><label for="3-1">X</label>
                    <input type="checkbox" id="3-2" name="shape"><label for="3-2">O</label>
                </div>
                <div class="square">
                    <input type="checkbox" id="4-1" name="shape"><label for="4-1">X</label>
                    <input type="checkbox" id="4-2" name="shape"><label for="4-2">O</label>
                </div>
                <div class="square">
                    <input type="checkbox" id="5-1" name="shape"><label for="5-1">X</label>
                    <input type="checkbox" id="5-2" name="shape"><label for="5-2">O</label>
                </div>
                <div class="square">
                    <input type="checkbox" id="6-1" name="shape"><label for="6-1">X</label>
                    <input type="checkbox" id="6-2" name="shape"><label for="6-2">O</label>
                </div>
                <div class="square">
                    <input type="checkbox" id="7-1" name="shape"><label for="7-1">X</label>
                    <input type="checkbox" id="7-2" name="shape"><label for="7-2">O</label>
                </div>
                <div class="square">
                    <input type="checkbox" id="8-1" name="shape"><label for="8-1">X</label>
                    <input type="checkbox" id="8-2" name="shape"><label for="8-2">O</label>
                </div>
                <div class="square">
                    <input type="checkbox" id="9-1" name="shape"><label for="9-1">X</label>
                    <input type="checkbox" id="9-2" name="shape"><label for="9-2">O</label>
                </div>
        </form>
    </main>
    <footer>
        <div class="decorative-rule-line">
            <div class="decorative-rule-dots"></div>
        </div>
    </footer>
</body>
