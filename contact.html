<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Michael Wong">
    <meta name="description" content="Nier:Automata CSS Demo">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nier:Automata CSS Demo</title>
    <link rel="stylesheet" href="style.css" type="text/css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>
    <header>
        <nav class="decorative-bar">
            <ul>
                <li><a href="./" class="fx clickable"><i class="material-icons">square</i>/</a></li>
                <li><a href="./log.html" class="fx clickable"><i class="material-icons">square</i>Log</a></li>
                <li><a href="./projects.html" class="fx clickable"><i class="material-icons">square</i>Projects</a></li>
                <li><a href="./git.html" class="fx clickable"><i class="material-icons">square</i>Git</a></li>
                <li><a href="./minigame.html" class="fx clickable"><i class="material-icons">square</i>Minigame</a></li>
                <li><a href="./about.html" class="fx clickable"><i class="material-icons">square</i>About</a></li>
                <li><a href="./contact.html" class="current-page clickable"><i class="material-icons">square</i>Contact</a></li>
            </ul>
        </nav>
    </header>
    <div class="decorative-rule-line">
        <div class="decorative-rule-dots"></div>
    </div>
    <main>
        <hgroup>
            <h1>Contact</h1>
            <p>Form</p>
        </hgroup>
        <form action="https://httpbin.org/post" method="post" class="contact-form">
            <div class="form-row"><label for="email">Email:</label>
                <div class="decorative-bar"><input type="text" id="email" name="email" placeholder="jane.doe@proton.me" required></div>
            </div>
            <div class="form-row"><label for="subject">Subject:</label>
                <div class="decorative-bar"><input type="text" id="subject" name="subject" placeholder="hello world" required></div>
            </div>
            <div class="form-row"><label for="message">Message:</label>
                <div class="decorative-bar"><textarea id="message" name="message" rows="5" col="15" placeholder="for demonstration purposes only, does not send out messages" required></textarea></div>
            </div>
            <div class="form-button-row">
                <div class="decorative-bar">
                    <button type="submit" class="fx clickable"><i class="material-icons">square</i> Send</button>
                </div>
                <button type="reset" class="fx clickable"><i class="material-icons">square</i> Clear</button>
            </div>
        </form>
    </main>
    <footer>
        <div class="decorative-rule-line">
            <div class="decorative-rule-dots"></div>
        </div>
    </footer>
</body>
